steps:
  # Step 1: Build the same API image (has all the dependencies)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mag-importer:latest', '.']

  # Step 2: Download CSV from GCS  
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['cp', 'gs://mag-sistema-imports-922967/PAGTOTAL_202603101502.csv', '/workspace/PAGTOTAL.csv']

  # Step 3: Run the import script via Cloud SQL Proxy
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    secretEnv: ['DATABASE_URL']
    args:
      - '-c'
      - |
        docker run --rm \
          -v /workspace/PAGTOTAL.csv:/app/PAGTOTAL.csv \
          -e DATABASE_URL="$$DATABASE_URL" \
          gcr.io/$PROJECT_ID/mag-importer:latest \
          python scripts/importar_pagtotal.py /app/PAGTOTAL.csv

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/mag-db-url-axa/versions/latest
      env: 'DATABASE_URL'

