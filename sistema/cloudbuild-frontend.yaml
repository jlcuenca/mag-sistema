steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-frontend:v20260318a'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://mag-api-922967332336.us-central1.run.app'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/mag-frontend:v20260318a'

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY
