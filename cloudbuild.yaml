# cloudbuild.yaml — CI/CD para MAG Sistema en GCP
# Proyecto: magia
# Trigger: push a main → build + deploy automático
#
# Servicios desplegados:
# 1. mag-api     (Cloud Run) — Backend FastAPI
# 2. mag-frontend (Cloud Run) — Frontend Next.js

steps:
  # ═══════════════════════════════════════════════
  # BACKEND — FastAPI
  # ═══════════════════════════════════════════════

  # Build imagen backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-api:latest'
      - '.'
    id: 'build-backend'

  # Push imagen backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/mag-api']
    id: 'push-backend'
    waitFor: ['build-backend']

  # Deploy backend a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mag-api'
      - '--image=gcr.io/$PROJECT_ID/mag-api:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--set-env-vars=DEMO_MODE=false,PYTHONUTF8=1'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # ═══════════════════════════════════════════════
  # FRONTEND — Next.js
  # ═══════════════════════════════════════════════

  # Build imagen frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-frontend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-frontend:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - './sistema'
    id: 'build-frontend'

  # Push imagen frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/mag-frontend']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Deploy frontend a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mag-frontend'
      - '--image=gcr.io/$PROJECT_ID/mag-frontend:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--memory=256Mi'
      - '--cpu=1'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

# Variables sustituibles (se configuran en el trigger)
substitutions:
  _API_URL: 'https://mag-api-PLACEHOLDER.run.app'

images:
  - 'gcr.io/$PROJECT_ID/mag-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/mag-api:latest'
  - 'gcr.io/$PROJECT_ID/mag-frontend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/mag-frontend:latest'

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
