steps:
  # Step 1: Build the API image (has all dependencies and scripts)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mag-recalc:latest', '.']

  # Step 2: Run the reprocessing script
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    secretEnv: ['DATABASE_URL']
    args:
      - '-c'
      - |
        docker run --rm \
          -e DATABASE_URL="$$DATABASE_URL" \
          gcr.io/$PROJECT_ID/mag-recalc:latest \
          python scripts/reprocesar_reglas_mag.py

timeout: '1800s'
options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/mag-db-url/versions/latest
      env: 'DATABASE_URL'
