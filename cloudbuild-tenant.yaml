# cloudbuild-tenant.yaml — CI/CD per-tenant para MAG Sistema
# Usa substitutions inyectadas por el trigger de Terraform:
#   _TENANT, _BACKEND_NAME, _FRONTEND_NAME, _API_URL, _REGION
#
# Este pipeline:
#   1. Builda la imagen Docker del backend (compartida)
#   2. Builda la imagen Docker del frontend (con API_URL del tenant)
#   3. Despliega ambas a los Cloud Run services del tenant

steps:
  # ═══════════════════════════════════════════════
  # BACKEND — Build + Deploy
  # ═══════════════════════════════════════════════

  # Build imagen backend (compartida, misma para todos los tenants)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-api:latest'
      - '.'
    id: 'build-backend'

  # Push imagen backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/mag-api']
    id: 'push-backend'
    waitFor: ['build-backend']

  # Deploy backend al Cloud Run del tenant
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_NAME}'
      - '--image=gcr.io/$PROJECT_ID/mag-api:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # ═══════════════════════════════════════════════
  # FRONTEND — Build + Deploy
  # ═══════════════════════════════════════════════

  # Build imagen frontend (con API URL del tenant)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-frontend-${_TENANT}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mag-frontend-${_TENANT}:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - './sistema'
    id: 'build-frontend'

  # Push imagen frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/mag-frontend-${_TENANT}']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Deploy frontend al Cloud Run del tenant
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_NAME}'
      - '--image=gcr.io/$PROJECT_ID/mag-frontend-${_TENANT}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

# Substituciones (inyectadas por Terraform trigger)
substitutions:
  _TENANT: 'axa'
  _BACKEND_NAME: 'mag-api-axa'
  _FRONTEND_NAME: 'mag-axa'
  _API_URL: 'https://mag-api-axa-PLACEHOLDER.run.app'
  _REGION: 'us-central1'

images:
  - 'gcr.io/$PROJECT_ID/mag-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/mag-api:latest'
  - 'gcr.io/$PROJECT_ID/mag-frontend-${_TENANT}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/mag-frontend-${_TENANT}:latest'

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
